name: Deploy

on:
  push:
    branches: [main]

  # Manual runs from the Actions tab, and also re-triggered by publish.yml
  # after a successful .deb upload (so the site catalog refreshes).
  # publish.yml passes rebuild_deb=false since setup.deb hasn't changed and
  # the new app .deb is already in R2.
  workflow_dispatch:
    inputs:
      rebuild_deb:
        description: "Rebuild and re-publish setup.deb"
        required: false
        type: boolean
        default: true

# Avoid double-deploys if two pushes land close together — cancel the
# in-flight one and only ship the newest.
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # paths-filter needs at least 2 commits to diff against.
          fetch-depth: 2

      - name: Detect .deb-relevant changes
        # Only meaningful on push events; on workflow_dispatch the inputs
        # control it. Output is "false" for workflow_dispatch.
        id: changes
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            deb:
              - 'scripts/build-deb.sh'
              - 'scripts/publish-repo.ts'
              - 'scripts/icon.png'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build .deb package
        # Three triggers:
        #   1. push that touched .deb-relevant files
        #   2. workflow_dispatch with rebuild_deb=true (default for UI runs)
        #
        # publish.yml triggers us with rebuild_deb=false; this step is skipped
        # because setup.deb didn't change and the app's .deb is already in R2.
        if: |
          (github.event_name == 'push' && steps.changes.outputs.deb == 'true') ||
          (github.event_name == 'workflow_dispatch' && inputs.rebuild_deb)
        run: bash scripts/build-deb.sh

      - name: Publish .deb to R2 apt repo
        if: |
          (github.event_name == 'push' && steps.changes.outputs.deb == 'true') ||
          (github.event_name == 'workflow_dispatch' && inputs.rebuild_deb)
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
        run: bun run publish

      - name: Sync package metadata from mirror
        # Always runs — picks up new packages published by other app repos
        # (via publish.yml), even when setup.deb didn't change.
        run: bun run sync-packages

      - name: Build Astro site
        run: bun run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
