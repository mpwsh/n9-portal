name: Deploy

on:
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Avoid double-deploys if two pushes land close together — cancel the
# in-flight one and only ship the newest.
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build .deb package
        # dpkg-deb is preinstalled on ubuntu-latest runners
        run: bash scripts/build-deb.sh

      - name: Publish .deb to R2 apt repo
        # Reads public/setup.deb, lists existing .debs in the R2 repo path,
        # regenerates Packages.gz, uploads the new versioned .deb and the
        # new index. Pure Bun — no mc, no dpkg-dev needed on the runner.
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
        run: bun run publish

      - name: Sync package metadata from mirror
        # Fetches each repo's Packages.gz, parses, writes src/data/packages.json
        # and public/search-index.json. Must run before astro build so the
        # /packages routes have data to render.
        run: bun run sync-packages

      - name: Build Astro site
        run: bun run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # The action's default is `deploy`, which is what we want.
          # `bun install` already happened above, so disable the action's own
          # install step to avoid duplicating it with npm.
          packageManager: bun
