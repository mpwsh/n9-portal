name: Deploy

on:
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Avoid double-deploys if two pushes land close together — cancel the
# in-flight one and only ship the newest.
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build .deb package
        # dpkg-deb is preinstalled on ubuntu-latest runners
        run: bash scripts/build-deb.sh

      - name: Build Astro site
        run: bun run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # The action's default is `deploy`, which is what we want.
          # `bun install` already happened above, so disable the action's own
          # install step to avoid duplicating it with npm.
          packageManager: bun
